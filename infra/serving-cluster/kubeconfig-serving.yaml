# Placeholder kubeconfig for the serving EKS cluster.
#
# Fill `certificate-authority-data`, `client-certificate-data`, and
# `client-key-data` from your own cluster:
#   aws eks update-kubeconfig --name <serving-cluster-name> --region <region> \
#       --kubeconfig infra/serving-cluster/kubeconfig-serving.yaml
#
# Then run the KServe install + Triton deploy against it:
#   KUBECONFIG=infra/serving-cluster/kubeconfig-serving.yaml \
#       bash infra/serving-cluster/deploy_kserve.sh
#   KUBECONFIG=infra/serving-cluster/kubeconfig-serving.yaml \
#       kubectl apply -f infra/serving-cluster/inferenceservice-triton.yaml
apiVersion: v1
clusters:
  - cluster:
      certificate-authority-data: REPLACE_ME
    name: recsys-serving
contexts:
  - context:
      cluster: recsys-serving
      user: recsys-serving
    name: recsys-serving
current-context: recsys-serving
kind: Config
preferences: {}
users:
  - name: recsys-serving
    user:
      client-certificate-data: REPLACE_ME
      client-key-data: REPLACE_ME