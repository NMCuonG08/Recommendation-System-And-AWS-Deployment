      - sh
      - -ec
      - |
        program_path=$(mktemp)
        printf "%s" "$0" > "$program_path"
        python3 -u "$program_path" "$@"
      - |
        def convert_onnx_op(output_path):
            """Export the ranker to ONNX and build the Triton model repository."""
            import os
            import subprocess
            from pathlib import Path

            Path(output_path).parent.mkdir(parents=True, exist_ok=True)
            print("Running module: models.ranking_sequence.convert2onnx_and_build_triton")
            env = os.environ.copy()
            env["PYTHONPATH"] = "/app"
            subprocess.run(
                ["uv", "run", "python", "-m", "models.ranking_sequence.convert2onnx_and_build_triton"],
                check=True, cwd="/app", env=env,
            )
            return (output_path,)

        import argparse
        _parser = argparse.ArgumentParser(prog='Convert onnx op', description='Export the ranker to ONNX and build the Triton model repository.')
        _parser.add_argument("--output-path", dest="output_path", type=str, required=True, default=argparse.SUPPRESS)
        _parsed_args = vars(_parser.parse_args())

        _outputs = convert_onnx_op(**_parsed_args)
      env:
      - {name: PVC_PATH, value: /data}
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef: {key: accesskey, name: minio-creds}
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef: {key: secretkey, name: minio-creds}
