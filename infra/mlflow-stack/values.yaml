# MLflow stack values (in-cluster Postgres + MinIO, mirroring docker-compose).
namespace: mlflow

mlflow:
  # Built from infra/images/mlflow.Dockerfile; push via infra/scripts/build_push.sh.
  image: cuongngx/recsys-mlflow:v1
  s3Endpoint: http://minio-service:9000
  bucket: mlflow-artifacts

minio:
  accessKey: admin
  secretKey: Password1234
  storage: 5Gi
  image: minio/minio:latest

postgres:
  password: Password1234
  storage: 2Gi
  image: postgres:16

storageClass:
  name: gp3
  provisioner: ebs.csi.aws.com
  type: gp3
  fsType: ext4