            """Train the Item2Vec model (Ray Train + MLflow)."""
            import os
            import subprocess
            from pathlib import Path

            Path(output_path).parent.mkdir(parents=True, exist_ok=True)
            print("Running module: models.item2vec.train")
            env = os.environ.copy()
            env["PYTHONPATH"] = "/app"
            subprocess.run(["uv", "run", "python", "-m", "models.item2vec.train"],
                           check=True, cwd="/app", env=env)
            return (output_path,)

        import argparse
        _parser = argparse.ArgumentParser(prog='Train item2vec op', description='Train the Item2Vec model (Ray Train + MLflow).')
        _parser.add_argument("--output-path", dest="output_path", type=str, required=True, default=argparse.SUPPRESS)
        _parsed_args = vars(_parser.parse_args())

